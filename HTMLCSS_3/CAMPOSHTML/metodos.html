<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>metodos</title>
</head>
<body>
    <!--Crie um novo arquivo HTML com a estrutura básica (doctype, html, head e body), meetodo post -->
    <form method="post" action="#">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required><br><br>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required><br><br>

        <label for="data">Data de Nascimento:</label>
        <input type="date" id="data" name="data" required><br><br>
        
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
